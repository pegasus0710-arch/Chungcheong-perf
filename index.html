<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chungcheong Sales Team 실적관리 시스템</title>

  <!-- ── 외부 라이브러리 (CDN) ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- ── 스타일 (디자인 수정 시 이 파일만 교체) ── -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── 비밀번호 게이트 화면 ── */
    #pw-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: #060e1c;
      display: flex; align-items: center; justify-content: center;
    }
    .pw-box {
      background: #0e1e32;
      border: 1px solid #1a2f47;
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,.6);
    }
    .pw-logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      box-shadow: 0 0 18px #818cf860;
    }
    .pw-title { color: #d8eaf8; font-size: 20px; font-weight: 900; letter-spacing: -0.04em; }
    .pw-sub   { color: #3d5f7e; font-size: 12px; margin-top: 2px; }
    .pw-label { color: #6b8fa8; font-size: 11px; font-weight: 700;
                letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
    .pw-input {
      width: 100%; background: #060e1c;
      border: 1px solid #1f3652; border-radius: 9px;
      padding: 12px 14px; color: #d8eaf8; font-size: 15px;
      outline: none; font-family: inherit; letter-spacing: 0.08em;
      transition: border-color .15s, box-shadow .15s;
    }
    .pw-input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px #818cf820;
    }
    .pw-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      border: none; border-radius: 9px;
      color: #fff; font-size: 14px; font-weight: 800;
      font-family: inherit; cursor: pointer;
      transition: opacity .15s;
    }
    .pw-btn:hover  { opacity: 0.88; }
    .pw-btn:active { opacity: 0.75; }
    .pw-error {
      color: #f87171; font-size: 12px; font-weight: 600;
      text-align: center; min-height: 18px;
    }
    .pw-hint {
      color: #3d5f7e; font-size: 11px; text-align: center;
      line-height: 1.6;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .shake { animation: shake .4s ease; }
  </style>
</head>
<body>

  <!-- ════════════════════════════════
       비밀번호 게이트
       ★ 비밀번호 변경 방법 ★
         1. https://emn178.github.io/online-tools/sha256.html 접속
         2. 새 비밀번호 입력 → 해시값 복사
         3. 아래 PW_HASH 값을 교체
         4. GitHub에 index.html 저장
       ════════════════════════════════ -->
  <div id="pw-gate">
    <div class="pw-box" id="pw-box">
      <div class="pw-logo">S</div>
      <div>
        <div class="pw-title">Chungcheong Sales Team</div>
        <div class="pw-sub">충청영업팀 실적관리 시스템 · 접근 권한 확인</div>
      </div>
      <div>
        <div class="pw-label">비밀번호</div>
        <input class="pw-input" type="password" id="pw-input"
               placeholder="비밀번호를 입력하세요"
               onkeydown="if(event.key==='Enter') checkPw()" />
      </div>
      <div class="pw-error" id="pw-error"></div>
      <button class="pw-btn" onclick="checkPw()">접속하기 →</button>
      <div class="pw-hint">비밀번호를 모르시면 관리자에게 문의하세요.</div>
    </div>
  </div>

  <!-- ── 앱 컨테이너 (인증 후 표시) ── -->
  <div id="root" style="display:none;"></div>

  <!-- ════════════════════════════════
       비밀번호 인증 스크립트
       ════════════════════════════════ -->
  <script>
    // ──────────────────────────────────────────────
    //  ★ 현재 비밀번호: mx2025!
    //  변경하려면 위 주석 안내를 따르세요.
    // ──────────────────────────────────────────────
    const PW_HASH = "7964106471ddb947a30a14c1f9a74a3fed4a7d6029f0047291138292c23a4c99";
    const SESSION_KEY = "cst_auth_v1";

    async function sha256(str) {
      const buf = await crypto.subtle.digest(
        "SHA-256", new TextEncoder().encode(str)
      );
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function checkPw() {
      const input = document.getElementById("pw-input").value;
      const errEl = document.getElementById("pw-error");
      const boxEl = document.getElementById("pw-box");
      if (!input) { errEl.textContent = "비밀번호를 입력해주세요."; return; }
      const hash = await sha256(input);
      if (hash === PW_HASH) {
        sessionStorage.setItem(SESSION_KEY, "1");
        document.getElementById("pw-gate").style.display = "none";
        document.getElementById("root").style.display = "block";
      } else {
        errEl.textContent = "비밀번호가 올바르지 않습니다.";
        boxEl.classList.remove("shake");
        void boxEl.offsetWidth;
        boxEl.classList.add("shake");
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
      }
    }

    // 이미 인증된 세션이면 바로 통과
    (function() {
      if (sessionStorage.getItem(SESSION_KEY) === "1") {
        document.getElementById("pw-gate").style.display = "none";
        document.getElementById("root").style.display = "block";
      } else {
        window.addEventListener("load", () =>
          document.getElementById("pw-input").focus()
        );
      }
    })();
  </script>

  <!-- ── 앱 로직 (기능·실적 로직 수정 시 이 파일만 교체) ── -->
  <script type="text/babel" src="app.js"></script>

</body>
</html>
