<script>
  // ── 인증: localStorage 사용 (탭 간 공유 가능, sessionStorage는 새 탭에서 초기화됨)
  const PW_HASH     = "7964106471ddb947a30a14c1f9a74a3fed4a7d6029f0047291138292c23a4c99";
  const AUTH_KEY    = "cst_auth_v1"; // index.html과 동일 키 → localStorage로 공유

  async function sha256(str){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }

  async function checkPw(){
    const input = document.getElementById("pw-input").value;
    const errEl = document.getElementById("pw-error");
    const boxEl = document.getElementById("pw-box");
    if(!input){ errEl.textContent="비밀번호를 입력해주세요."; return; }
    const hash = await sha256(input);
    if(hash === PW_HASH){
      localStorage.setItem(AUTH_KEY, "1");   // localStorage → 탭 간 유지
      document.getElementById("pw-gate").style.display = "none";
    } else {
      errEl.textContent = "비밀번호가 올바르지 않습니다.";
      boxEl.classList.remove("shake"); void boxEl.offsetWidth; boxEl.classList.add("shake");
      document.getElementById("pw-input").value = "";
    }
  }

  // 페이지 로드 시: localStorage에 인증 정보 있으면 게이트 없이 바로 진입
  // 없으면 비번 게이트 표시
  (function(){
    if(localStorage.getItem(AUTH_KEY) === "1"){
      // 인증됨 → pw-gate 이미 display:none이므로 그대로
    } else {
      document.getElementById("pw-gate").style.display = "flex";
      window.addEventListener("load", ()=>document.getElementById("pw-input").focus());
    }
  })();
</script>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ── ErrorBoundary
class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  componentDidCatch(e,info){console.error("PlanApp 에러:",e,info);}
  render(){
    if(this.state.err) return(
      <div style={{padding:40,color:"#f07070",fontFamily:"monospace",background:"#07101f",minHeight:"100vh"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>⚠ 렌더 오류</div>
        <pre style={{fontSize:12,whiteSpace:"pre-wrap",color:"#e8f4fd"}}>{String(this.state.err)}</pre>
        <button onClick={()=>this.setState({err:null})}
          style={{marginTop:20,padding:"8px 20px",background:"#7c83f5",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14}}>
          재시도
        </button>
      </div>
    );
    return this.props.children;
  }
}

const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const PARTS=["대외영업","혼수","뉴홈","입주","이사","SAC","거주중","B2B","SMB","농협","휴대폰"];
const MODES=["판매","매출"];
const YRS=["26","25","24"];
const LS_PLAN="cst_plan_draft_v1";

const KC={
  "대외영업":"#38b6f5","혼수":"#f5b942","뉴홈":"#2dd488","입주":"#34d399",
  "이사":"#60a5fa","SAC":"#c084fc","거주중":"#f472b6","B2B":"#fb923c",
  "SMB":"#facc15","농협":"#a3e635","휴대폰":"#94a3b8","CE":"#7c83f5"
};

const C={
  bg:"#07101f",surf:"#0d1b2e",card:"#0f2138",card2:"#0a1628",
  b1:"rgba(255,255,255,.08)",b2:"rgba(255,255,255,.14)",
  text:"#e8f4fd",muted:"#4a7090",muted2:"#6a9ab8",
  accent:"#7c83f5",blue:"#3b82f6",green:"#2dd488",
  orange:"#f5b942",teal:"#2dd4bf",red:"#f07070",
  판매:"#f5b942",매출:"#38b6f5",
};

const gNum=v=>parseFloat(v)||0;
const sk=i=>`${i}`;
const pctC=v=>{const n=gNum(v);return n>=100?C.green:n>=80?C.orange:C.red;};
const grwC=v=>{const n=gNum(v);return n>0?C.green:n<0?C.red:C.muted2;};

function fullRow(r){
  const base={CE:0,혼수:0,입주:0,이사:0,SAC:0,거주중:0,SMB:0,농협:0,휴대폰:0};
  if(!r)return{...base,대외영업:0,뉴홈:0,B2B:0};
  const o={...base,...r};
  const hp=gNum(o.휴대폰);
  o.대외영업=gNum(o.혼수)+gNum(o.입주)+gNum(o.이사)+gNum(o.SAC)+gNum(o.거주중)+gNum(o.SMB)+gNum(o.농협)+hp;
  o.뉴홈=gNum(o.입주)+gNum(o.이사);
  o.B2B=gNum(o.SMB)+gNum(o.농협)+hp;
  return o;
}

// ── SVG 미니 라인 차트
function MiniChart({series,labels,h=130,pctMode=false,grMode=false}){
  const [tip,setTip]=useState(null);
  const W=560,PT=18,PL=32,PR=20,PB=28;
  const iH=h-PT-PB, iW=W-PL-PR;
  const allV=series.flatMap(s=>s.data.filter(v=>v!==null)).map(gNum);
  if(!allV.length) return <div style={{height:h,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>데이터 없음</div>;

  const maxV=Math.max(...allV,pctMode?100:0.1);
  const cy=v=>PT+iH*(1-(gNum(v))/(maxV||1));
  const cx=i=>PL+iW*i/11;
  const smooth=pts=>{
    if(!pts.length) return "";
    let d=`M${pts[0].x},${pts[0].y}`;
    for(let i=1;i<pts.length;i++){
      const px=pts[i-1],nx=pts[i];
      const cpx=(px.x+nx.x)/2;
      d+=` C${cpx},${px.y} ${cpx},${nx.y} ${nx.x},${nx.y}`;
    }
    return d;
  };

  return(
    <div style={{position:"relative"}}>
      <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h,overflow:"visible"}} onMouseLeave={()=>setTip(null)}>
        {[0,.25,.5,.75,1].map(r=>(
          <line key={r} x1={PL} y1={PT+iH*(1-r)} x2={W-PR} y2={PT+iH*(1-r)} stroke="rgba(255,255,255,.05)" strokeWidth={1}/>
        ))}
        {pctMode&&<line x1={PL} y1={cy(100)} x2={W-PR} y2={cy(100)} stroke={C.green} strokeWidth={1} strokeDasharray="4,3" opacity={.5}/>}
        {series.map((s,si)=>{
          const pts=s.data.map((v,i)=>({x:cx(i),y:cy(v),v:gNum(v)})).filter((_,i)=>s.data[i]!==null);
          if(!pts.length) return null;
          const d=smooth(pts);
          const fillPath=`${d} L${pts[pts.length-1].x},${PT+iH} L${pts[0].x},${PT+iH} Z`;
          return(
            <g key={si}>
              {s.fill&&<path d={fillPath} fill={s.color} opacity={.08}/>}
              <path d={d} fill="none" stroke={s.color} strokeWidth={s.bold?2.5:1.5} strokeDasharray={s.dash?"5,3":undefined} opacity={s.op||1}/>
              {pts.map((p,pi)=>(
                <circle key={pi} cx={p.x} cy={p.y} r={s.bold?3.5:2.5} fill={s.color} stroke={C.bg} strokeWidth={1.5} opacity={s.op||1}/>
              ))}
              {s.showLabels&&pts.map((p,pi)=>{
                const prev=pts[pi-1];
                const goUp=!prev||p.y<prev.y;
                return(
                  <text key={pi} x={p.x} y={p.y+(goUp?-10:13)} fill={s.color} fontSize={9} fontWeight={700}
                    textAnchor={p.x<PL+30?"start":p.x>W-PR-30?"end":"middle"}
                    style={{filter:"drop-shadow(0 1px 2px rgba(0,0,0,.8))"}}>
                    {pctMode||grMode?Math.round(p.v)+"%":Math.round(p.v)}
                  </text>
                );
              })}
            </g>
          );
        })}
        {labels.map((_,i)=>(
          <rect key={i} x={cx(i)-18} y={PT} width={36} height={iH} fill="transparent"
            onMouseEnter={()=>{
              const items=series.map(s=>({label:s.label,color:s.color,val:s.data[i]})).filter(it=>it.val!==null);
              setTip({mi:i,items,xi:i});
            }}/>
        ))}
        {labels.map((l,i)=>(
          <text key={i} x={cx(i)} y={h-8} fill={C.muted} fontSize={9} textAnchor="middle">{l}</text>
        ))}
      </svg>
      {tip&&(
        <div style={{position:"absolute",left:`${Math.min(tip.xi/11*90+2,68)}%`,top:"10%",
          background:"rgba(7,16,31,.96)",border:`1px solid ${C.b2}`,
          borderRadius:8,padding:"8px 12px",pointerEvents:"none",zIndex:10,
          boxShadow:"0 4px 16px rgba(0,0,0,.5)",minWidth:100}}>
          <div style={{color:C.muted,fontSize:9,marginBottom:4,fontWeight:700}}>{labels[tip.mi]}</div>
          {tip.items.map((it,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",gap:10,marginBottom:2}}>
              <span style={{color:C.muted2,fontSize:10}}>{it.label}</span>
              <span style={{color:it.color,fontSize:11,fontWeight:800}}>
                {pctMode||grMode?Math.round(gNum(it.val))+"%":Math.round(gNum(it.val))+"억"}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Chip({c,children}){
  return <span style={{background:c+"22",color:c,fontSize:9,fontWeight:700,
    padding:"2px 6px",borderRadius:4,border:`1px solid ${c}40`}}>{children}</span>;
}

function TabBtn({label,active,color,onClick}){

      padding:"4px 10px",borderRadius:5,cursor:"pointer",fontWeight:700,fontSize:11,
      fontFamily:"inherit",border:`1px solid ${active?color:C.b1}`,
      background:active?color+"22":"transparent",color:active?color:C.muted}}>
      {label}
    </button>
  );
}

// ── 메인 앱
function PlanApp(){
  const [perfData,setPerfData]=useState(null);
  const [planData,setPlanData]=useState({});
  const [draft,setDraft]=useState({});
  const [part,setPart]=useState("대외영업");
  const [mode,setMode]=useState("판매");
  const [yr,setYr]=useState("26");
  const [chartTab,setChartTab]=useState("실적");
  const [cumChartTab,setCumChartTab]=useState("실적");
  const [saveState,setSaveState]=useState("idle");
  const [dbReady,setDbReady]=useState(false);
  const [planInput,setPlanInput]=useState("26");
  const autoSaveTimer=useRef(null);

  // Firebase 로드
  useEffect(()=>{
    (async()=>{
      try{
        const snap=await window.db.collection("perf").doc("main").get();
        if(snap.exists){
          const d=snap.data();
          if(d.perfData) setPerfData(d.perfData);
          if(d.planData)  setPlanData(d.planData);
        }
      }catch(e){ console.error("Firebase 로드 오류:",e); }
      finally{ setDbReady(true); }
    })();
  },[]);

  // localStorage 임시저장 복원
  useEffect(()=>{
    try{
      const saved=localStorage.getItem(LS_PLAN);
      if(saved) setDraft(JSON.parse(saved));
    }catch{}
  },[]);

  // draft 변경 시 3초 후 localStorage 자동저장
  useEffect(()=>{
    clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current=setTimeout(()=>{
      try{ localStorage.setItem(LS_PLAN,JSON.stringify(draft)); }catch{}
    },3000);
    return()=>clearTimeout(autoSaveTimer.current);
  },[draft]);

  const pD=useMemo(()=>perfData?.[yr]?.[mode]?.perf||{},[perfData,yr,mode]);
  const tD=useMemo(()=>perfData?.[yr]?.[mode]?.target||{},[perfData,yr,mode]);
  const prevYrKey=yr==="26"?"25":yr==="25"?"24":null;
  const pD25=useMemo(()=>prevYrKey&&perfData?.[prevYrKey]?.[mode]?.perf||{}:{},[perfData,prevYrKey,mode]);

  const mPerf=useMemo(()=>MONTHS.map((_,i)=>gNum(fullRow(pD[sk(i)])?.[part])),[pD,part]);
  const mTgt=useMemo(()=>MONTHS.map((_,i)=>gNum(fullRow(tD[sk(i)])?.[part])),[tD,part]);
  const mPrev=useMemo(()=>MONTHS.map((_,i)=>gNum(fullRow(pD25[sk(i)])?.[part])),[pD25,part]);

  const emi=useMemo(()=>{
    for(let i=11;i>=0;i--){
      const r=pD[sk(i)];
      if(r&&Object.values(r).some(v=>gNum(v)>0)) return i;
    }
    return -1;
  },[pD]);

  // 계획 데이터 접근
  const getPlan=(pYr,pMode,pPart,mi)=>{
    const d=draft?.[pYr]?.[pMode]?.[pPart];
    const p=planData?.[pYr]?.[pMode]?.[pPart];
    if(mi==="annual") return gNum(d?.annual)||gNum(p?.annual);
    return gNum(d?.[mi])||gNum(p?.[mi]);
  };
  const setPlan=(pYr,pMode,pPart,mi,val)=>{
    setDraft(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(!next[pYr]) next[pYr]={};
      if(!next[pYr][pMode]) next[pYr][pMode]={};
      if(!next[pYr][pMode][pPart]) next[pYr][pMode][pPart]={};
      if(mi==="annual") next[pYr][pMode][pPart].annual=parseFloat(val)||0;
      else next[pYr][pMode][pPart][mi]=parseFloat(val)||0;
      return next;
    });
  };

  // Firebase 저장
  const handleSave=async()=>{
    setSaveState("saving");
    try{
      const merged=JSON.parse(JSON.stringify(planData));
      const mergeDeep=(t,s)=>{
        Object.keys(s).forEach(k=>{
          if(s[k]&&typeof s[k]==="object"&&!Array.isArray(s[k])){
            if(!t[k]) t[k]={};
            mergeDeep(t[k],s[k]);
          } else { t[k]=s[k]; }
        });
      };
      mergeDeep(merged,draft);
      await window.db.collection("perf").doc("main").set(
        {planData:merged, planUpdatedAt:new Date().toISOString()},
        {merge:true}
      );
      setPlanData(merged);
      setDraft({});
      localStorage.removeItem(LS_PLAN);
      setSaveState("saved");
      setTimeout(()=>setSaveState("idle"),2500);
    }catch(e){
      console.error("저장 오류:",e);
      setSaveState("error");
      setTimeout(()=>setSaveState("idle"),3000);
    }
  };

  // KPI
  const ytdP=mPerf.slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const ytdT=mTgt.slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const ytdPrev=mPrev.slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const annT=mTgt.reduce((a,b)=>a+b,0);
  const remT=Math.max(annT-ytdP,0);
  const remMonths=Math.max(11-emi,0);
  const avgMonthly=emi>=0&&ytdP>0?Math.round(ytdP/(emi+1)):0;
  const needPM=remMonths>0?Math.ceil(remT/remMonths):0;
  const ytdAr=ytdT>0?(ytdP/ytdT*100).toFixed(1):null;
  const ytdGr=ytdPrev>0?((ytdP-ytdPrev)/ytdPrev*100).toFixed(1):null;

  // CE/대외 비중
  const ceYtd=emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum(fullRow(pD[sk(i)])?.CE),0):0;
  const hpYtd=emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum(fullRow(pD[sk(i)])?.휴대폰),0):0;
  const daeYtd=emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum(fullRow(pD[sk(i)])?.대외영업),0):0;
  const ceSharePct=ceYtd>0&&part!=="CE"&&ytdP>0?(
    part==="대외영업"?(daeYtd-hpYtd)/ceYtd*100
    :ytdP/ceYtd*100
  ):null;
  const daeSharePct=daeYtd>0&&part!=="대외영업"&&part!=="CE"&&ytdP>0?ytdP/daeYtd*100:null;

  // 누계
  let cumP=0,cumT=0,cumPrev=0;
  const cumPerf=MONTHS.map((_,i)=>{ if(i>emi)return null; cumP+=mPerf[i]; return cumP; });
  const cumTgt=MONTHS.map((_,i)=>{ cumT+=mTgt[i]; return cumT; });
  const cumPrevArr=MONTHS.map((_,i)=>{ if(i>emi)return null; cumPrev+=mPrev[i]; return cumPrev; });
  const cumAr=MONTHS.map((_,i)=>{ if(i>emi||!cumTgt[i])return null; return (cumPerf[i]||0)/cumTgt[i]*100; });
  const cumGr=MONTHS.map((_,i)=>{ if(i>emi||!cumPrevArr[i])return null; return ((cumPerf[i]||0)-cumPrevArr[i])/cumPrevArr[i]*100; });

  // 달성률/성장률
  const mArArr=MONTHS.map((_,i)=>i<=emi&&mTgt[i]>0?(mPerf[i]/mTgt[i]*100):null);
  const mGrArr=MONTHS.map((_,i)=>i<=emi&&mPrev[i]>0?((mPerf[i]-mPrev[i])/mPrev[i]*100):null);

  // 계획
  const planMonthly=MONTHS.map((_,i)=>getPlan(planInput,mode,part,i));
  const planAnnual=getPlan(planInput,mode,part,"annual");

    addSheet("KPI요약",[

      ["누계실적",ytdP?Math.round(ytdP)+"억":"─"],
      ["누계달성률",ytdAr?ytdAr+"%":"─"],

      ["대외영업비중",daeSharePct?daeSharePct.toFixed(1)+"%":"─"],

            </div>
            <div style={{background:C.card,border:`1px solid ${C.teal}40`,borderRadius:8,padding:"10px 14px",flex:2,minWidth:240}}>
              <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:6}}>🔮 연말 예상 달성 시뮬레이터</div>
              <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                <div>
                  <div style={{color:C.muted2,fontSize:9}}>현재실적</div>
                  <div style={{color:color,fontSize:13,fontWeight:900}}>{ytdP?Math.round(ytdP).toLocaleString()+"억":"─"}</div>
                </div>
                <div style={{color:C.muted,fontSize:13}}>+</div>
                <div>
                  <div style={{color:C.muted2,fontSize:9}}>잔여계획합계</div>
                  <div style={{color:C.accent,fontSize:13,fontWeight:900}}>
                    {planMonthly.slice(emi+1).reduce((a,b)=>a+b,0)?Math.round(planMonthly.slice(emi+1).reduce((a,b)=>a+b,0)).toLocaleString()+"억":"─"}
                  </div>
                </div>
                <div style={{color:C.muted,fontSize:13}}>=</div>
                <div>
                  <div style={{color:C.muted2,fontSize:9}}>연말 예상</div>
                  <div style={{color:C.teal,fontSize:13,fontWeight:900}}>{expectedEnd?Math.round(expectedEnd).toLocaleString()+"억":"─"}</div>
                </div>
                <div>
                  <div style={{color:C.muted2,fontSize:9}}>예상 달성률</div>
                  <div style={{color:expectedAr?pctC(expectedAr):C.muted,fontSize:13,fontWeight:900}}>
                    {expectedAr?Math.round(gNum(expectedAr))+"%":"─"}
                  </div>
                </div>
                {planSum>0&&annT>0&&<div>
                  <div style={{color:C.muted2,fontSize:9}}>월계획 합계</div>
                  <div style={{color:C.orange,fontSize:13,fontWeight:900}}>{Math.round(planSum).toLocaleString()}억</div>
                </div>}
              </div>
            </div>
          </div>

          {/* 월별 입력 테이블 */}
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",minWidth:800,width:"100%"}}>
              <thead>
                <tr style={{borderBottom:`2px solid ${C.b1}`}}>
                  <td style={{padding:"5px 10px",color:C.muted,fontSize:10,fontWeight:700,minWidth:72,position:"sticky",left:0,background:C.card2}}>항목</td>
                  {MONTHS.map(m=>(
                    <td key={m} style={{padding:"5px 5px",textAlign:"center",color:C.muted2,fontSize:10,fontWeight:600,minWidth:54}}>{m}</td>
                  ))}
                  <td style={{padding:"5px 8px",textAlign:"right",color:C.muted2,fontSize:10,fontWeight:700,minWidth:52}}>합계</td>
                </tr>
              </thead>
              <tbody>
                {/* 목표 참고 */}
                <tr style={{borderBottom:`1px solid ${C.b1}18`}}>
                  <td style={{padding:"4px 10px",color:C.orange,fontSize:10,fontWeight:600,position:"sticky",left:0,background:C.card2}}>연간목표</td>
                  {mTgt.map((v,i)=>(
                    <td key={i} style={{padding:"4px 5px",textAlign:"center"}}>
                      <span style={{color:C.orange,fontSize:10,opacity:.7}}>{v>0?Math.round(v).toLocaleString():"─"}</span>
                    </td>
                  ))}
                  <td style={{padding:"4px 8px",textAlign:"right"}}>
                    <span style={{color:C.orange,fontWeight:700,fontSize:11}}>{annT?Math.round(annT).toLocaleString()+"억":"─"}</span>
                  </td>
                </tr>
                {/* 계획 입력 */}
                <tr style={{background:C.accent+"08",borderBottom:`1px solid ${C.accent}30`}}>
                  <td style={{padding:"4px 10px",color:C.accent,fontSize:10,fontWeight:700,position:"sticky",left:0,background:C.card}}>계획 입력</td>
                  {MONTHS.map((_,i)=>{
                    const v=planMonthly[i];
                    const tgt=mTgt[i];
                    const warn=tgt>0&&v>0&&Math.abs(v-tgt)/tgt>0.2;
                    return(
                      <td key={i} style={{padding:"3px 3px",textAlign:"center"}}>
                        <input type="number" value={v||""}
                          onChange={e=>setPlan(planInput,mode,part,i,e.target.value)}
                          placeholder={tgt?Math.round(tgt):"0"}
                          style={{width:50,background:C.bg,border:`1px solid ${warn?C.orange:C.b1}`,
                            borderRadius:4,padding:"3px 4px",color:C.text,fontSize:11,
                            textAlign:"center",outline:"none",fontFamily:"inherit"}}/>
                      </td>
                    );
                  })}
                  <td style={{padding:"4px 8px",textAlign:"right"}}>
                    <span style={{color:C.accent,fontWeight:700,fontSize:11}}>{planSum?Math.round(planSum).toLocaleString()+"억":"─"}</span>
                  </td>
                </tr>
                {/* 실적 */}
                <tr style={{borderBottom:`1px solid ${C.b1}18`}}>
                  <td style={{padding:"4px 10px",color,fontSize:10,fontWeight:600,position:"sticky",left:0,background:C.card2}}>실적</td>
                  {mPerf.map((v,i)=>(
                    <td key={i} style={{padding:"4px 5px",textAlign:"center"}}>
                      <span style={{color:i<=emi?color:C.muted,fontSize:10}}>{i<=emi&&v>0?Math.round(v).toLocaleString():"─"}</span>
                    </td>
                  ))}
                  <td style={{padding:"4px 8px",textAlign:"right"}}>
                    <span style={{color,fontWeight:700,fontSize:11}}>{ytdP?Math.round(ytdP).toLocaleString()+"억":"─"}</span>
                  </td>
                </tr>
                {/* Gap */}
                <tr style={{borderBottom:`1px solid ${C.b1}18`}}>
                  <td style={{padding:"4px 10px",color:C.muted,fontSize:10,fontWeight:600,position:"sticky",left:0,background:C.card2}}>Gap</td>
                  {planGap.map((v,i)=>(
                    <td key={i} style={{padding:"4px 5px",textAlign:"center"}}>
                      {v!==null?<span style={{color:v>=0?C.green:C.red,fontSize:10,fontWeight:700}}>{v>=0?"+":""}{Math.round(v)}</span>
                        :<span style={{color:C.muted,fontSize:9}}>─</span>}
                    </td>
                  ))}
                  <td/>
                </tr>
                {/* 전월比 */}
                <tr>
                  <td style={{padding:"4px 10px",color:C.muted,fontSize:10,fontWeight:600,position:"sticky",left:0,background:C.card2}}>전월比</td>
                  {planMonthly.map((v,i)=>{
                    const prev=planMonthly[i-1];
                    const diff=prev>0&&v>0?((v-prev)/prev*100):null;
                    return(
                      <td key={i} style={{padding:"4px 5px",textAlign:"center"}}>
                        {diff!==null?<span style={{color:diff>=0?C.green:C.red,fontSize:9}}>{diff>=0?"+":""}{diff.toFixed(0)}%</span>
                          :<span style={{color:C.muted,fontSize:9}}>─</span>}
                      </td>
                    );
                  })}
                  <td/>
                </tr>
              </tbody>
            </table>
          </div>

          {/* 목표 대비 경고 */}
          {planSum>0&&annT>0&&Math.abs(planSum-annT)/annT>0.05&&(
            <div style={{marginTop:10,padding:"8px 12px",borderRadius:7,
              background:planSum<annT?C.red+"18":C.green+"18",
              border:`1px solid ${planSum<annT?C.red:C.green}40`}}>
              <span style={{color:planSum<annT?C.red:C.green,fontSize:11,fontWeight:700}}>
                {planSum<annT
                  ?`⚠ 월계획 합계(${Math.round(planSum)}억)가 연간목표(${Math.round(annT)}억)보다 ${Math.round(annT-planSum)}억 부족합니다.`
                  :`✅ 월계획 합계(${Math.round(planSum)}억)가 연간목표(${Math.round(annT)}억)를 ${Math.round(planSum-annT)}억 초과합니다.`}
              </span>
            </div>
          )}
        </div>

        <div style={{color:C.muted,fontSize:10,textAlign:"center",paddingBottom:16}}>
          충청영업팀 실적관리 시스템 · 달성 계획 / 비밀번호 문의: 관리자
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><PlanApp/></ErrorBoundary>);
</script>
</body>
</html>
